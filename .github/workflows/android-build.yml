name: Android Build

# ─────────────────────────────────────────────────────────
# CI: Android (Gradle) + Web (Next.js) in parallel jobs
# ─────────────────────────────────────────────────────────

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permissions
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :android-app:assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew :android-app:assembleRelease --stacktrace

      - name: Build release AAB
        run: ./gradlew :android-app:bundleRelease --stacktrace

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fractured-earth-outputs
          path: |
            android-app/build/outputs/apk/debug/
            android-app/build/outputs/apk/release/
            android-app/build/outputs/bundle/release/

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Use dummy values so Next.js build succeeds without real KV/OAuth secrets
          KV_REST_API_URL: https://dummy.kv.vercel.app
          KV_REST_API_TOKEN: dummy
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          NEXTAUTH_SECRET: dummy_secret_for_ci_only
          NEXTAUTH_URL: http://localhost:3000
