name: Android Build

# ─────────────────────────────────────────────────────────
# CI: Android (Gradle) + Web (Next.js) in parallel jobs
# ─────────────────────────────────────────────────────────

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Mobile (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup & Sync Mobile Assets
        shell: bash
        run: |
          npm install --prefix apps/angular-mobile --legacy-peer-deps
          npm run build --prefix apps/angular-mobile
          npx cap sync android --project apps/angular-mobile

      - name: Grant execute permissions
        shell: bash
        run: chmod +x apps/angular-mobile/android/gradlew

      - name: Build local artifacts
        shell: bash
        run: |
          cd apps/angular-mobile/android
          ./gradlew :app:assembleDebug --stacktrace
          ./gradlew :app:assembleRelease --stacktrace
          ./gradlew :app:bundleRelease --stacktrace

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fractured-earth-outputs
          path: |
            apps/angular-mobile/android/app/build/outputs/apk/debug/*.apk
            apps/angular-mobile/android/app/build/outputs/apk/release/*.apk
            apps/angular-mobile/android/app/build/outputs/bundle/release/*.aab

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/next-api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/next-api/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --continue-on-error

      - name: Build
        run: npm run build
        env:
          # Use dummy values so Next.js build succeeds without real KV/OAuth secrets
          KV_REST_API_URL: https://dummy.kv.vercel.app
          KV_REST_API_TOKEN: dummy
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          NEXTAUTH_SECRET: dummy_secret_for_ci_only
          NEXTAUTH_URL: http://localhost:3000
