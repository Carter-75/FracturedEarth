name: Android Build

# ─────────────────────────────────────────────────────────
# CI: Android (Gradle) + Web (Next.js) in parallel jobs
# ─────────────────────────────────────────────────────────

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Mobile (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Inject Mock Config (CI Only)
        shell: bash
        run: |
          mkdir -p apps/angular-mobile/src/app
          cat <<EOF > apps/angular-mobile/src/app/config.ts
          export const CONFIG = {
            revenueCat: {
              publicKey: 'goog_dummy_key',
              entitlementId: 'pro'
            },
            adMob: {
              bannerId: 'ca-app-pub-3940256099942544/6300978111',
              interstitialId: 'ca-app-pub-3940256099942544/1033173712'
            },
            adSense: {
              bannerId: 'ca-pub-0000000000000000',
              interstitialId: 'ca-pub-0000000000000000'
            }
          };
          EOF

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup & Sync Mobile Assets
        shell: bash
        run: |
          cd apps/angular-mobile
          npm install --legacy-peer-deps
          npm run build
          npx cap sync android

      - name: Grant execute permissions
        shell: bash
        run: chmod +x apps/angular-mobile/android/gradlew

      - name: Build local artifacts
        shell: bash
        run: |
          cd apps/angular-mobile/android
          ./gradlew :app:assembleDebug --stacktrace
          ./gradlew :app:assembleRelease --stacktrace
          ./gradlew :app:bundleRelease --stacktrace

      - name: Upload APK/AAB artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fractured-earth-outputs
          path: |
            apps/angular-mobile/android/app/build/outputs/apk/debug/*.apk
            apps/angular-mobile/android/app/build/outputs/apk/release/*.apk
            apps/angular-mobile/android/app/build/outputs/bundle/release/*.aab

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/next-api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/next-api/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --continue-on-error

      - name: Build
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/ci_dummy
          # Use dummy values so Next.js build succeeds without real OAuth secrets
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          NEXTAUTH_SECRET: dummy_secret_for_ci_only
          NEXTAUTH_URL: http://localhost:3000
